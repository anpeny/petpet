name: Build Cross-Platform Native Pet

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build app bundle
        run: bash scripts/build-mac-app.sh

      - name: Package app
        run: |
          cd dist/mac
          zip -qry "Q JK 桌宠-mac.zip" "Q JK 桌宠.app"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: q-jk-desktop-pet-macos
          path: "dist/mac/Q JK 桌宠-mac.zip"
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build binary
        run: cargo build --release --manifest-path rust/native-pet/Cargo.toml

      - name: Package binary and assets
        shell: pwsh
        run: |
          $out = "dist/windows/native-pet"
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          Copy-Item "rust/native-pet/target/release/native-pet.exe" "$out/native-pet.exe"
          Copy-Item "assets" "$out/assets" -Recurse
          Compress-Archive -Path "$out/*" -DestinationPath "dist/windows/q-jk-desktop-pet-windows.zip" -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: q-jk-desktop-pet-windows
          path: dist/windows/q-jk-desktop-pet-windows.zip
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libgtk-3-dev libappindicator3-dev libxdo-dev

      - name: Build binary
        run: cargo build --release --manifest-path rust/native-pet/Cargo.toml

      - name: Package binary and assets
        run: |
          mkdir -p dist/linux/native-pet
          cp rust/native-pet/target/release/native-pet dist/linux/native-pet/native-pet
          cp -R assets dist/linux/native-pet/assets
          tar -C dist/linux -czf dist/linux/q-jk-desktop-pet-linux.tar.gz native-pet

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: q-jk-desktop-pet-linux
          path: dist/linux/q-jk-desktop-pet-linux.tar.gz
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-macos
      - build-windows
      - build-linux
    runs-on: ubuntu-22.04
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/release

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find dist/release -type f -exec cp {} release-assets/ \;
          ls -la release-assets

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "$GITHUB_REF_NAME" release-assets/* \
            --title "$GITHUB_REF_NAME" \
            --notes "Native desktop pet build for macOS, Windows, and Linux." \
            --latest
